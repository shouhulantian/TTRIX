output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Eval TRIX 27204 ep9 ckpt on YAGO with RE-GCN-style single-step protocol:
# at each test timestep t, the message-passing graph = train + valid +
# test events at all timestamps < t (ground-truth feedback). Matches
# nec-research/TKG-Forecasting-Evaluation feedgt=True.
#
# Optimization: relation_adj reused from base train+valid build (not
# rebuilt per timestep) -- single-step now ~ as fast as static eval.

dataset:
  class: TemporalYAGO
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: TransductiveInference
  eval_mode: single_step
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 6
  num_epoch: 0
  log_interval: 100
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-04-30-13-30-04/model_epoch_10.pth
