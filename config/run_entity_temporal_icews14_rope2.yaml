output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

dataset:
  class: TemporalICEWS14
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

# TRIX with RoPE2 entity message passing -- mirrors TIGER's setting
# (RoPE2 only on the entity-side scoring NBFNet; relation graph stays
# distmult since it's over relations, not entities).

model:
  class: TRIX
  # Scaled to dim=64 (was 32). Layer counts unchanged: relation 3 layers,
  # entity_model_1 2 layers, entity_model_2 4 layers.
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2          # entity-graph NBFNet, time-aware
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2          # entity-graph NBFNet, time-aware (TIGER-style)
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: TransductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 4
  num_epoch: 10
  log_interval: 100
  batch_per_epoch: 4000
