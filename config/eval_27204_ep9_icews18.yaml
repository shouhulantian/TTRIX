output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Zero-shot eval of TRIX 27204 ep9 (model_epoch_10.pth, joint full-test
# MRR 0.6233) on ICEWS18 (TeRo split, transductive). 23,033 entities,
# 256 relations, 304 timestamps (24-hour stride, range 0-5736),
# 468,558 quads. Chronological train/valid/test split.
#
# Setup mirrors ICEWS0515 eval (bs=6); ICEWS18 has slightly larger test
# (49,545 vs 46,092) and 2x more entities (31K reindexed vs 10.5K) so
# all_negative scoring is heavier. 4h walltime should be plenty on 3 A100.

dataset:
  class: TemporalICEWS18
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: TransductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 6
  num_epoch: 0
  log_interval: 100
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-04-30-13-30-04/model_epoch_10.pth
