output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

dataset:
  class: TemporalICEWS14
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

# A/B test against run_entity_temporal_icews14_rope2.yaml: identical
# architecture, only entity message_func differs (RoPE2 -> RoPE2_decay).
# RoPE2_decay adds the RoPE-attention locality gate (sigmoid of
# (rotated_message · relation_j) / sqrt(d)). No learnable parameters
# added; locality emerges from the rotation's frequency-band decay.

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: TransductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 4
  num_epoch: 10
  log_interval: 100
  batch_per_epoch: 4000
