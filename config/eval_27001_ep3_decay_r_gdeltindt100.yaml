output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Zero-shot eval of TRIX + RoPE2_decay (= decay_r, relation_j gate) on
# GDELTIndT_100. Closes the §18 gate-ablation matrix: decay_q's 0.491
# inductive transfer needs a matched-capacity (dim=64) decay_r datapoint
# to isolate "is the gate's transfer benefit specific to query-gate vs
# any gate?".
#
# Ckpt = 27001 ep3 (best val MRR 0.6153 = model_epoch_4.pth, test MRR
# 0.6030 on ICEWS14). Architecture matches 27001 exactly.

dataset:
  class: GDELTIndT100Temporal
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: InductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 16
  num_epoch: 0
  log_interval: 100
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/TemporalICEWS14/2026-04-28-17-23-13/model_epoch_4.pth
