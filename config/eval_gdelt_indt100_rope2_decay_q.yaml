output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

dataset:
  class: GDELTIndT100Temporal
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

# Architecture must match the 27037 training run exactly
# (TRIX dim=64, both entity NBFNets use RoPE2_decay_q).

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: InductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 8
  num_epoch: 0      # zero-shot: skip training, eval only
  log_interval: 100
  batch_per_epoch: null

checkpoint: {{ ckpt }}
