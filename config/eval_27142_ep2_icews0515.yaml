output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Eval 27142's post-epoch-2 ckpt on full TemporalICEWS0515 valid + test
# (with time-aware filter). Companion to eval_27142_ep2_icews14.yaml --
# joint-trained model evaluated on each source graph separately.
# bs=16 (vs ICEWS14 eval's bs=4) because 27170's bs=4 ICEWS14 eval used
# only 8.5 GB / 46 GB on A40 -- ICEWS0515 has ~1.5x more entities so
# per-bs cost is ~1.5x but we have 4x headroom.

dataset:
  class: TemporalICEWS0515
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: TransductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 4      # bs=16 OOMed (48 GB peak on A40 44 GB) -- ICEWS0515
                     # has 5x more filter-graph edges than ICEWS14, so the
                     # all_negative + temporal_strict_negative_mask passes
                     # consume ~5x more memory per bs than 27170's 8.5 GB
                     # at bs=4 on ICEWS14. bs=4 should land at ~25-40 GB.
  num_epoch: 0       # eval only
  log_interval: 100
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-04-29-19-04-51/model_epoch_3.pth
