output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# TRIX + T-RoPE-Gq joint pretraining on ICEWS14 + ICEWS0515 with a SHARED
# day-ordinal time vocabulary (JointTemporalDataset). Same TRIX architecture
# as the single-graph T-RoPE-Gq runs (run_entity_temporal_icews14_rope2_decay_q
# / run_entity_temporal_icews0515_rope2_decay.yaml's dim=64 / 6-layer setup),
# only the dataset wrapper and trainer differ.

dataset:
  class: JointTemporalDataset
  graphs: [ICEWS14, ICEWS0515]
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: MultiGraphPretraining
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 8
  num_epoch: 10
  log_interval: 200
  batch_per_epoch: 8000
  sampling: equal     # ICEWS14 (90k) vs ICEWS0515 (461k) are 1:5 imbalanced;
                      # uniform graph sampling matches the FITTER joint recipe.
