output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Vanilla TRIX 27364 ep4 ckpt (model_epoch_5.pth, distmult-only, joint
# training peak g1 0.501 / g2 0.454) zero-shot on the GDELT inductive
# 8-variant sweep. Mirror of eval_27204_ep3_gdelt_sweep.yaml but with
# distmult on every entity_model. Submit per-variant via:
#   sbatch --export=DATASET=GDELTIndT_25_inter_Temporal ...

dataset:
  class: {{ dataset }}
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: InductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 16
  num_epoch: 0
  log_interval: 100
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-05-01-08-42-09/model_epoch_5.pth
