output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Eval TRIX 27204 ep9 ckpt on YAGO with all 3 protocols in sequence:
#   * static     -- fixed message graph = train+valid (our current default)
#   * single_step -- per-timestep rolling history with GROUND-TRUTH feedback
#                    (matches RE-GCN feedgt=True / TKG-Forecasting-Eval)
#   * multi_step -- per-timestep rolling with MODEL TOP-1 PREDICTIONS
#                    (autoregressive, errors compound)
#
# YAGO has only 6 unique test timestamps (years 183-188), so the rolling
# loop is cheap (6 relation_adj rebuilds). Single run produces 3 result
# tables, directly comparable across protocols.

dataset:
  class: TemporalYAGO
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: TransductiveInference
  eval_mode: both
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 6
  num_epoch: 0
  log_interval: 100
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-04-30-13-30-04/model_epoch_10.pth
