output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Zero-shot transfer: 27142 (TRIX joint, ICEWS14+ICEWS0515 trained) on
# GDELTIndT_100 (V/R/T strict-disjoint, p_tri=1.0). Inductive inference
# task because entity, relation, AND time vocabularies are all unseen
# at test. bs=32 -- GDELTIndT_100 has only 272 unseen entities so the
# all_negative expansion is small; even bs=32 stays well under the
# A40's 44 GB.

dataset:
  class: GDELTIndT100Temporal
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: InductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 32
  num_epoch: 0
  log_interval: 100
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-04-29-19-04-51/model_epoch_3.pth
