output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

dataset:
  class: TemporalICEWS0515
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

# T-RoPE-G (RoPE2_decay = T-RoPE + locality gate) on TRIX with dim=64
# entity NBFNets. Targeting 80-GB A100s on aisa-gpuA02; ICEWS0515's
# larger graph (~10k entities, ~500k edges incl. inverse) needs the
# extra memory at dim=64.

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: TransductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 2
  num_epoch: 10
  log_interval: 100
  batch_per_epoch: 4000
