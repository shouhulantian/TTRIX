output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Vanilla TRIX 27364 ep4 ckpt (model_epoch_5.pth, distmult-only) zero-
# shot on the WIKI inductive 8-variant sweep. Mirror of
# eval_27204_ep9_wikiind_sweep.yaml but with distmult on every
# entity_model. Submit per-variant via:
#   sbatch --export=DATASET=WIKIIndT_25_inter_Temporal ...
#
# bs=32 chosen for the small WIKI inductive footprints (V_inf 235-1089,
# msg ~5-20K edges); 3xA100-80GB has lots of headroom.

dataset:
  class: {{ dataset }}
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: InductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 32
  num_epoch: 0
  log_interval: 50
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-05-01-08-42-09/model_epoch_5.pth
