output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Eval 27204's post-epoch-9 ckpt (model_epoch_10.pth, NEW best joint TRIX
# at full-test joint MRR 0.6233, beating prior peak ep3 0.6165).
# Zero-shot transfer to WIKIIndT_25_inter (regenerated p_rel=0.25 split:
# train 27716, msg 20330, test 5082, num_time 232, V_inf 1089).
#
# bs=32 chosen vs the bs=6 used for ICEWS0515: WIKI's all_negative ranking
# only spans 1089 entities (vs ~10K for ICEWS0515) and the filter graph is
# 10x smaller, so per-query forward is much cheaper. 3xA100-80GB has plenty
# of memory.

dataset:
  class: WIKIIndT_25_inter_Temporal
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: InductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 32
  num_epoch: 0
  log_interval: 50
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-04-30-13-30-04/model_epoch_10.pth
