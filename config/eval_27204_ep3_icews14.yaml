output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Eval 27204's post-epoch-3 ckpt (model_epoch_4.pth, peak joint TRIX) on
# ICEWS14 transductive test. Mirrors eval_27204_ep3_icews0515.yaml; bs=6
# matches the resubmission tier we settled on for ICEWS0515 after 27355
# walltime overrun.

dataset:
  class: TemporalICEWS14
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: TransductiveInference
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 6
  num_epoch: 0
  log_interval: 100
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-04-30-13-30-04/model_epoch_4.pth
