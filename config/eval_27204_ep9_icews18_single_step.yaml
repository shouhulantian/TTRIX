output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Eval TRIX 27204 ep9 ckpt on ICEWS18 with RE-GCN-style single-step
# protocol. Same setup as eval_27204_ep9_yago_single_step.yaml but on
# ICEWS18 (49,545 test queries, 838K train+valid msg graph, 256 rels).
#
# ICEWS18 has many more distinct test timestamps than YAGO (~76 vs 6),
# so per-timestep score loops are expected to dominate runtime. The
# relation_adj reuse optimization keeps this manageable.

dataset:
  class: TemporalICEWS18
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: TransductiveInference
  eval_mode: single_step
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, hits@10_50]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 6
  num_epoch: 0
  log_interval: 100
  batch_per_epoch: null

checkpoint: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output/TRIX/JointTemporalDataset/2026-04-30-13-30-04/model_epoch_10.pth
