output_dir: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/output

# Smoke test for pretrain_entity_temporal.py + JointTemporalDataset +
# RoPE2_decay_q. Identical architecture and dataset to
# pretrain_entity_temporal_decay_q.yaml; only num_epoch / batch_per_epoch /
# fast_test are slashed so the run completes in a few minutes and validates
# the full path: data load -> DDP forward/backward -> test().

dataset:
  class: JointTemporalDataset
  graphs: [ICEWS14, ICEWS0515]
  root: /mnt/nfs/home/ac139229/jiaxin/git/git/TTRIX/datasets

model:
  class: TRIX
  relation_model:
    class: NBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_1:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model_2:
    class: IndNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64]
    message_func: RoPE2_decay_q
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: MultiGraphPretraining
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 1     # A40 (44 GB) can't fit bs=4 with ICEWS0515 graph
                    # under RoPE2_decay_q (single-graph ICEWS0515+decay
                    # uses bs=2 on A100/80 GB). Smoke goal is code path
                    # validation, not throughput.
  num_epoch: 1
  log_interval: 20
  batch_per_epoch: 60
  fast_test: 200
  sampling: equal
